name: Deploy to GitHub Pages

# Ad ogni push su main: rigenera graph.json dalla pipeline, builda con Vite
# e pubblica dist/ su GitHub Pages. La rigenerazione di graph.json in CI
# garantisce coerenza anche se ci si dimentica di rigenerarlo in locale.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta; non annullare un deploy in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Rigenera public/graph.json dall'archivio arricchito.
      # build_graph.py usa solo la stdlib: nessuna dipendenza pip. Senza --input
      # sceglie da solo l'archivio con audio (spotify_archive_features.json) se
      # presente, altrimenti quello con i soli generi. enrich_audio.py NON gira
      # in CI: i dati audio sono committati a parte.
      - name: Generate graph.json
        run: python scripts/build_graph.py --output public/graph.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
