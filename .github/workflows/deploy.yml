name: Deploy to GitHub Pages

# Ad ogni push su main: rigenera graph.json dalla pipeline, builda con Vite
# e pubblica dist/ su GitHub Pages. La rigenerazione di graph.json in CI
# garantisce coerenza anche se ci si dimentica di rigenerarlo in locale.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta; non annullare un deploy in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Guardia d'integrità: l'archivio live deve essere internamente coerente
      # (conteggi, arricchimento completo, playlist valide) PRIMA di generare
      # il grafo. Un merge corrotto ferma il deploy qui.
      - name: Check archive integrity
        run: python scripts/check_archive.py

      # Test della pipeline dati (add_playlist + check_archive), stdlib only.
      - name: Run pipeline tests
        run: python -m unittest discover -s tests -q

      # Rigenera public/graph.json dall'archivio.
      # build_graph.py usa solo la stdlib: nessuna dipendenza pip. Senza --input
      # usa la sorgente live data/spotify_archive_enriched.json (fallback
      # estremo: gli archivi storici congelati in legacy/data/).
      - name: Generate graph.json
        run: python scripts/build_graph.py --output public/graph.json

      # Guardia anti-drift: i conteggi nella riga "Current state:" del README
      # devono combaciare con graph.json appena rigenerato, altrimenti stop.
      - name: Check docs are in sync with graph.json
        run: python scripts/check_docs.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
